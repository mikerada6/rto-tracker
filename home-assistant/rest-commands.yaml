# ============================================================
# RTO Tracker — rest_command definitions
# ============================================================
# Add to configuration.yaml:
#   rest_command: !include rest-commands.yaml
#
# API keys and the base URL are stored in secrets.yaml — never
# hardcoded here. !secret only works as a standalone YAML value,
# so the full URL (including port and path) must be the secret.
#
# See secrets-snippet.example.yaml for the required entries.
# ============================================================

rto_event_michael:
  url: !secret rto_events_url
  method: POST
  content_type: "application/json; charset=utf-8"
  headers:
    X-API-Key: !secret rto_api_key_michael
  payload: >-
    {
      "externalId": "{{ externalId }}",
      "eventType":  "{{ eventType }}",
      "timestamp":  "{{ timestamp }}"
    }

rto_event_jen:
  url: !secret rto_events_url
  method: POST
  content_type: "application/json; charset=utf-8"
  headers:
    X-API-Key: !secret rto_api_key_jen
  payload: >-
    {
      "externalId": "{{ externalId }}",
      "eventType":  "{{ eventType }}",
      "timestamp":  "{{ timestamp }}"
    }

