# ============================================================
# RTO Tracker — secrets.yaml entries
# ============================================================
# Merge these lines into your existing secrets.yaml.
# DO NOT commit secrets.yaml to version control.
#
# NOTE: !secret only works as a complete YAML value — it cannot
# be embedded inside a string like "http://!secret host:8080/...".
# That is why the full URL (with port and path) is stored here.
# ============================================================

# Full URL to the events endpoint.
# Change the host/port to match your RTO Tracker backend.
rto_events_url: "http://192.168.1.100:8080/api/v1/events"

# API keys — copy each value from the RTO Tracker Settings page.
rto_api_key_michael: REPLACE_WITH_MICHAEL_API_KEY
rto_api_key_jen: REPLACE_WITH_JEN_API_KEY

