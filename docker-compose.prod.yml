services:

  # ── Backend (Spring Boot) ────────────────────────────────────────
  app:
    image: mikerada6/rto-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER:?Set DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
      TEMPO_URL: ${TEMPO_URL:-}
      APP_RATE_LIMIT_RPM: ${APP_RATE_LIMIT_RPM:-100}
      APP_REGISTRATION_ENABLED: ${APP_REGISTRATION_ENABLED:-false}
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL:?Set LOKI_URL}
        loki-batch-size: "400"
        labels: "service=rto-backend"

  # ── Frontend (Angular + Nginx) ──────────────────────────────────
  frontend:
    image: mikerada6/rto-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8880}:80"
    depends_on:
      - app
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL:?Set LOKI_URL}
        loki-batch-size: "400"
        labels: "service=rto-frontend"
